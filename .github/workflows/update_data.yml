name: Scheduled World Cup Data Update

on:
  schedule:
    # Runs every 4 hours during the tournament (adjust cron syntax as needed)
    - cron: '0 */4 * * *'
  workflow_dispatch: # Allows you to trigger it manually via the GitHub UI

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Explicitly sets up Node.js 24 environment
    - name: Set up Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    # Sets up Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas

    - name: Run Ingestion
      env:
        FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
      run: python Ingestion.py

    - name: Run Transformation
      run: python transform.py

    - name: Commit and Push Updated Data
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add data/*.json data/*.csv
        # Only commit if data actually changed to avoid empty workflow loops
        git diff-index --quiet HEAD || git commit -m "Auto-update tournament match stats [Skip CI]"
        git push
